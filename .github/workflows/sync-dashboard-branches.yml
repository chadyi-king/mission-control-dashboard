name: Sync Dashboard Publishing Branch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - '*.json'
      - '.nojekyll'
      - 'assets/**'
      - '.github/workflows/sync-dashboard-branches.yml'
      - '.github/workflows/verify-live-dashboard.yml'

permissions:
  contents: write
  actions: read
  deployments: read
  pages: write

concurrency:
  group: mission-control-dashboard-branch-publish
  cancel-in-progress: true

jobs:
  publish-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard source from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: source
          token: ${{ github.token }}

      - name: Build and verify clean gh-pages artifact
        working-directory: source
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public
          find . -maxdepth 1 -type f \
            \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.json' -o -name '.nojekyll' \) \
            -exec cp '{}' public/ \;
          if [ -d assets ]; then cp -R assets public/assets; fi
          touch public/.nojekyll

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');
          const site = 'public';
          const forbidden = /api\.github\.com|GitHub PAT|Personal Access Token|Mark Done to persist/i;
          const fail = (message) => { throw new Error(message); };
          const read = (file) => fs.readFileSync(path.join(site, file), 'utf8');
          const readJson = (file) => JSON.parse(read(file));
          for (const file of ['index.html', 'dashboard-current.json', 'data.json']) {
            if (!fs.existsSync(path.join(site, file))) fail(`missing ${file}`);
          }
          for (const file of fs.readdirSync(site)) {
            if (/\.(html|js)$/i.test(file) && forbidden.test(read(file))) {
              fail(`${file} contains old browser write/PAT pattern`);
            }
          }
          const root = read('index.html');
          if (!root.includes('dashboard-current.json')) fail('index.html does not load dashboard-current.json');
          const manifest = readJson('dashboard-current.json');
          if (manifest.kind !== 'mission-control-dashboard-current-app') fail('dashboard-current.json kind mismatch');
          if (!manifest.currentApp) fail('dashboard-current.json missing currentApp');
          if (!fs.existsSync(path.join(site, manifest.currentApp))) fail(`missing current app ${manifest.currentApp}`);
          const dataPath = manifest.dataSnapshot || 'data.json';
          if (!fs.existsSync(path.join(site, dataPath))) fail(`missing data snapshot ${dataPath}`);

          const aliases = { backlog: 'open', pending: 'open', todo: 'open', review: 'needs_review', check_this: 'needs_review', waiting_on_you: 'input_requested', needs_input: 'input_requested', in_progress: 'active' };
          const normalizeStatus = (status) => {
            const raw = String(status || 'open').trim().toLowerCase().replace(/[\s-]+/g, '_');
            return aliases[raw] || raw || 'open';
          };
          const dataText = read(dataPath);
          const data = JSON.parse(dataText);
          const tasks = Object.entries(data.tasks || {}).filter(([, task]) => task && typeof task === 'object').map(([id, task]) => ({ id, ...task }));
          const visible = tasks.filter((task) => normalizeStatus(task.status) !== 'removed');
          const done = visible.filter((task) => normalizeStatus(task.status) === 'done');
          const projects = new Set();
          Object.keys(data.projects || {}).forEach((id) => projects.add(String(id).toUpperCase()));
          Object.keys(data.projectDetails || {}).forEach((id) => projects.add(String(id).toUpperCase()));
          Object.values(data.categories || {}).forEach((category) => (category.projects || []).forEach((id) => projects.add(String(id).toUpperCase())));
          visible.forEach((task) => { if (task.project) projects.add(String(task.project).toUpperCase()); });
          const c4 = (data.projects || {}).C4 || (data.projectDetails || {}).C4 || {};
          if (projects.size < 22) fail(`expected at least 22 projects, found ${projects.size}`);
          if (!projects.has('C4')) fail('missing C4');
          if (c4.name !== 'Website Services') fail(`expected C4 Website Services, found ${JSON.stringify(c4.name)}`);
          if (!visible.length) fail('no visible tasks found');
          if (done.length > visible.length) fail('done task count exceeds visible task count');
          const proof = {
            kind: 'mission-control-dashboard-deployment-proof',
            publishedBy: 'sync-dashboard-branches.yml',
            sourceBranch: 'main',
            sourceSha: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID,
            runAttempt: process.env.GITHUB_RUN_ATTEMPT,
            createdAt: new Date().toISOString(),
            currentApp: manifest.currentApp,
            dataSnapshot: dataPath,
            dataSha256: crypto.createHash('sha256').update(dataText).digest('hex'),
            expected: { projects: projects.size, visibleTasks: visible.length, doneTasks: done.length, c4Name: c4.name }
          };
          fs.writeFileSync(path.join(site, 'deployment-proof.json'), JSON.stringify(proof, null, 2) + '\n');
          console.log(`Mission Control artifact verified: ${projects.size} projects / ${visible.length} visible tasks / ${done.length} done / C4 Website Services`);
          NODE

      - name: Checkout gh-pages publishing branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Replace gh-pages with clean artifact
        run: |
          set -euo pipefail
          find gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R source/public/. gh-pages/
          cd gh-pages
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'gh-pages already matches the clean dashboard artifact.'
          else
            git commit -m "Publish dashboard from main ${GITHUB_SHA}"
            git push origin gh-pages
          fi

      - name: Capture Pages source diagnostic
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd source
          mkdir -p diagnostics

          api() {
            local path="$1"
            curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com${path}"
          }

          pages_json=$(mktemp)
          pages_status="ok"
          if ! api "/repos/${REPO}/pages" > "$pages_json" 2> diagnostics/pages-api-error.txt; then
            pages_status="error"
            printf '{}' > "$pages_json"
          fi

          runs_json=$(mktemp)
          runs_status="ok"
          if ! api "/repos/${REPO}/actions/runs?per_page=20" > "$runs_json" 2> diagnostics/actions-api-error.txt; then
            runs_status="error"
            printf '{"workflow_runs":[]}' > "$runs_json"
          fi

          deployments_json=$(mktemp)
          deployments_status="ok"
          if ! api "/repos/${REPO}/deployments?environment=github-pages&per_page=20" > "$deployments_json" 2> diagnostics/deployments-api-error.txt; then
            deployments_status="error"
            printf '[]' > "$deployments_json"
          fi

          node - "$pages_json" "$runs_json" "$deployments_json" "$pages_status" "$runs_status" "$deployments_status" <<'NODE'
          const fs = require('fs');
          const [pagesFile, runsFile, deploymentsFile, pagesStatus, runsStatus, deploymentsStatus] = process.argv.slice(2);
          const readJson = (file, fallback) => {
            try { return JSON.parse(fs.readFileSync(file, 'utf8')); }
            catch { return fallback; }
          };
          const pages = readJson(pagesFile, {});
          const runsRaw = readJson(runsFile, { workflow_runs: [] });
          const deploymentsRaw = readJson(deploymentsFile, []);
          const report = {
            kind: 'mission-control-pages-source-diagnostic',
            generatedAt: new Date().toISOString(),
            generatedByWorkflowRun: process.env.RUN_ID,
            diagnosticCommit: process.env.SHA,
            repository: process.env.REPO,
            apiStatus: { pages: pagesStatus, actions: runsStatus, deployments: deploymentsStatus },
            pages: {
              status: pages.status,
              url: pages.html_url || pages.url,
              cname: pages.cname || null,
              custom404: pages.custom_404,
              buildType: pages.build_type,
              source: pages.source || null,
              public: pages.public
            },
            recentWorkflowRuns: (runsRaw.workflow_runs || []).slice(0, 12).map((run) => ({
              id: run.id,
              name: run.name,
              event: run.event,
              status: run.status,
              conclusion: run.conclusion,
              head_branch: run.head_branch,
              head_sha: run.head_sha,
              created_at: run.created_at,
              updated_at: run.updated_at,
              html_url: run.html_url
            })),
            recentGithubPagesDeployments: (deploymentsRaw || []).slice(0, 12).map((deployment) => ({
              id: deployment.id,
              sha: deployment.sha,
              ref: deployment.ref,
              task: deployment.task,
              environment: deployment.environment,
              created_at: deployment.created_at,
              updated_at: deployment.updated_at,
              statuses_url: deployment.statuses_url
            }))
          };
          fs.writeFileSync('diagnostics/pages-source-latest.json', JSON.stringify(report, null, 2) + '\n');
          NODE

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/pages-source-latest.json diagnostics/*-api-error.txt || true
          if git diff --cached --quiet; then
            echo 'No diagnostic changes to commit.'
          else
            git commit -m 'Capture GitHub Pages source diagnostic'
            git push origin HEAD:main
          fi
