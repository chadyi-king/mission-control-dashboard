name: Archived - Legacy Branch Publisher Disabled

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain active publisher
        run: |
          echo 'This workflow is intentionally disabled.'
          echo 'Mission Control Dashboard now uses GitHub Actions Pages deployment through .github/workflows/pages.yml.'
          echo 'Do not publish dashboard files by writing directly to gh-pages.'
          echo 'The public URL is trusted only after verify-live-dashboard.yml passes against the root URL.'
