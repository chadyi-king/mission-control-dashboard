name: Verify Live Mission Control Dashboard

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Verify Mission Control Dashboard Source
    types:
      - completed

permissions:
  contents: read

jobs:
  verify-live:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify GitHub Pages root, manifest, app, assets, and data snapshot
        run: |
          node <<'NODE'
          const assert = (condition, message) => {
            if (!condition) throw new Error(message);
          };
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const base = 'https://chadyi-king.github.io/mission-control-dashboard/';

          const aliases = {
            backlog: 'open', pending: 'open', todo: 'open', review: 'needs_review',
            check_this: 'needs_review', waiting_on_you: 'input_requested', needs_input: 'input_requested',
            in_progress: 'active'
          };
          const normalizeStatus = (status) => {
            const raw = String(status || 'open').trim().toLowerCase().replace(/[\s-]+/g, '_');
            return aliases[raw] || raw || 'open';
          };
          const withCacheBust = (path, cacheKey) => {
            const url = new URL(path, base);
            url.searchParams.set('verify', cacheKey);
            url.searchParams.set('t', String(Date.now()));
            return url.toString();
          };
          const fetchText = async (path, cacheKey) => {
            const url = path.startsWith('http') ? path : withCacheBust(path, cacheKey);
            const response = await fetch(url, {
              cache: 'no-store',
              headers: {
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
              }
            });
            const text = await response.text();
            return { url, response, text };
          };
          const jsonFrom = async (path, cacheKey) => {
            const result = await fetchText(path, cacheKey);
            assert(result.response.ok, `${result.url} HTTP ${result.response.status}`);
            return JSON.parse(result.text);
          };
          const normalizeRef = (ref) => {
            if (!ref) return null;
            const raw = String(ref).trim();
            if (!raw || raw.startsWith('#')) return null;
            if (/^(data:|mailto:|tel:|javascript:)/i.test(raw)) return null;
            if (/^https?:\/\//i.test(raw) && !raw.startsWith(base)) return null;
            const url = new URL(raw, base);
            let clean = url.pathname.replace(/^\/mission-control-dashboard\//, '').replace(/^\//, '');
            if (!clean || clean.includes('..')) return null;
            return clean;
          };
          const refsFromHtml = (html) => {
            const refs = [];
            for (const match of html.matchAll(/<(?:link|script)[^>]+(?:href|src)=["']([^"']+)["']/gi)) {
              const ref = normalizeRef(match[1]);
              if (ref) refs.push(ref);
            }
            const legacy = html.match(/LEGACY_VISUAL_APP\s*=\s*['"]([^'"]+)['"]/);
            if (legacy) {
              const ref = normalizeRef(legacy[1]);
              if (ref) refs.push(ref);
            }
            return [...new Set(refs)];
          };
          const assertNoOldBrowserWritePath = (label, text) => {
            assert(!/GitHub PAT|Personal Access Token|api\.github\.com|Mark Done to persist/i.test(text), `${label} contains old browser write/PAT pattern`);
          };
          const verifySnapshot = (data) => {
            const tasks = Object.entries(data.tasks || {})
              .filter(([, task]) => task && typeof task === 'object')
              .map(([id, task]) => ({ id: task.id || id, ...task }))
              .filter((task) => normalizeStatus(task.status) !== 'removed');
            const done = tasks.filter((task) => normalizeStatus(task.status) === 'done');
            const projects = new Set();
            Object.keys(data.projects || {}).forEach((id) => projects.add(String(id).toUpperCase()));
            Object.keys(data.projectDetails || {}).forEach((id) => projects.add(String(id).toUpperCase()));
            Object.values(data.categories || {}).forEach((category) => (category.projects || []).forEach((id) => projects.add(String(id).toUpperCase())));
            tasks.forEach((task) => { if (task.project) projects.add(String(task.project).toUpperCase()); });
            const c4 = (data.projects || {}).C4 || (data.projectDetails || {}).C4 || {};
            assert(projects.size === 22, `expected 22 projects, found ${projects.size}`);
            assert(projects.has('C4'), 'missing C4');
            assert(c4.name === 'Website Services', `expected C4 Website Services, found ${JSON.stringify(c4.name)}`);
            assert(tasks.length === 106, `expected 106 visible tasks, found ${tasks.length}`);
            assert(done.length === 29, `expected 29 done tasks, found ${done.length}`);
          };

          (async () => {
            let lastError;
            for (let attempt = 1; attempt <= 12; attempt += 1) {
              const cacheKey = `verify-${Date.now()}-${attempt}`;
              try {
                const root = await fetchText('', cacheKey);
                assert(root.response.ok, `root HTTP ${root.response.status}`);
                assert(root.text.includes('dashboard-current.json'), 'root does not load dashboard-current.json');
                assert(root.text.includes('RED SUN COMMAND'), 'root does not contain Red Sun boot shell');
                assertNoOldBrowserWritePath('root', root.text);

                const manifest = await jsonFrom('dashboard-current.json', cacheKey);
                assert(manifest.kind === 'mission-control-dashboard-current-app', `manifest kind mismatch: ${manifest.kind}`);
                assert(manifest.currentApp, 'manifest missing currentApp');
                assert(manifest.dataSnapshot || 'data.json', 'manifest missing dataSnapshot');

                const app = await fetchText(manifest.currentApp, cacheKey);
                assert(app.response.ok, `${manifest.currentApp} HTTP ${app.response.status}`);
                assertNoOldBrowserWritePath(manifest.currentApp, app.text);

                const htmlToInspect = new Map([[manifest.currentApp, app.text]]);
                for (const [htmlFile, html] of [...htmlToInspect]) {
                  for (const ref of refsFromHtml(html)) {
                    const asset = await fetchText(ref, cacheKey);
                    assert(asset.response.ok, `${ref} HTTP ${asset.response.status} referenced by ${htmlFile}`);
                    if (ref.endsWith('.html') && !htmlToInspect.has(ref)) htmlToInspect.set(ref, asset.text);
                    if (/\.(html|js)$/i.test(ref)) assertNoOldBrowserWritePath(ref, asset.text);
                  }
                }

                const allRefs = [...htmlToInspect.values()].flatMap(refsFromHtml);
                const cssRefs = allRefs.filter((ref) => ref.endsWith('.css'));
                const jsRefs = allRefs.filter((ref) => ref.endsWith('.js'));
                assert(cssRefs.length > 0, 'current app references no CSS assets');
                assert(jsRefs.length > 0, 'current app references no JS assets');

                const data = await jsonFrom(manifest.dataSnapshot || 'data.json', cacheKey);
                verifySnapshot(data);

                console.log('Live Mission Control verified.');
                console.log(`Root: 200`);
                console.log(`Manifest currentApp: ${manifest.currentApp}`);
                console.log(`CSS refs: ${[...new Set(cssRefs)].join(', ')}`);
                console.log(`JS refs: ${[...new Set(jsRefs)].join(', ')}`);
                console.log('Data: 22 projects / 106 visible tasks / 29 done / C4 Website Services');
                return;
              } catch (error) {
                lastError = error;
                console.log(`Attempt ${attempt} failed: ${error.message}`);
                await sleep(15000);
              }
            }
            throw lastError;
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
