name: Verify Live Mission Control Dashboard

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy Mission Control Dashboard
    types:
      - completed

permissions:
  contents: read

jobs:
  verify-live:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify GitHub Pages bootloader, app, assets, and data snapshot
        run: |
          node <<'NODE'
          const assert = (condition, message) => {
            if (!condition) throw new Error(message);
          };
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const fetchText = async (url) => {
            const response = await fetch(url, {
              headers: {
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
              }
            });
            const text = await response.text();
            return { response, text };
          };
          const jsonFrom = async (url) => {
            const { response, text } = await fetchText(url);
            assert(response.ok, `${url} HTTP ${response.status}`);
            return JSON.parse(text);
          };
          const aliases = {
            backlog: 'open', pending: 'open', todo: 'open', review: 'needs_review',
            check_this: 'needs_review', waiting_on_you: 'input_requested', needs_input: 'input_requested',
            in_progress: 'active'
          };
          const normalizeStatus = (status) => {
            const raw = String(status || 'open').trim().toLowerCase().replace(/[\s-]+/g, '_');
            return aliases[raw] || raw || 'open';
          };
          const verifySnapshot = (data) => {
            const tasks = Object.entries(data.tasks || {})
              .filter(([, task]) => task && typeof task === 'object')
              .map(([id, task]) => ({ id: task.id || id, ...task }))
              .filter((task) => normalizeStatus(task.status) !== 'removed');
            const done = tasks.filter((task) => normalizeStatus(task.status) === 'done');
            const projects = new Set();
            Object.keys(data.projects || {}).forEach((id) => projects.add(String(id).toUpperCase()));
            Object.keys(data.projectDetails || {}).forEach((id) => projects.add(String(id).toUpperCase()));
            Object.values(data.categories || {}).forEach((category) => (category.projects || []).forEach((id) => projects.add(String(id).toUpperCase())));
            tasks.forEach((task) => { if (task.project) projects.add(String(task.project).toUpperCase()); });
            const c4 = (data.projects || {}).C4 || (data.projectDetails || {}).C4 || {};
            assert(projects.size === 22, `expected 22 projects, found ${projects.size}`);
            assert(projects.has('C4'), 'missing C4');
            assert(c4.name === 'Website Services', `expected C4 Website Services, found ${JSON.stringify(c4.name)}`);
            assert(tasks.length === 106, `expected 106 visible tasks, found ${tasks.length}`);
            assert(done.length === 29, `expected 29 done tasks, found ${done.length}`);
          };
          const assertNoOldBrowserWritePath = (label, text) => {
            assert(!/GitHub PAT|Personal Access Token|api\.github\.com|Mark Done to persist/i.test(text), `${label} contains old browser write/PAT pattern`);
          };

          const base = 'https://chadyi-king.github.io/mission-control-dashboard/';
          let lastError;
          for (let attempt = 1; attempt <= 8; attempt += 1) {
            const cacheKey = `verify-${Date.now()}-${attempt}`;
            try {
              const rootUrl = `${base}?${cacheKey}`;
              const root = await fetchText(rootUrl);
              assert(root.response.ok, `root HTTP ${root.response.status}`);
              assert(root.text.includes('dashboard-current.json'), 'root did not load dashboard-current.json boot manifest');
              assert(root.text.includes('app-20260623-backend-contract-1.html'), 'root did not reference current backend-contract app');
              assert(root.text.includes('RED SUN COMMAND'), 'root did not contain Red Sun boot shell');
              assertNoOldBrowserWritePath('root', root.text);

              const manifest = await jsonFrom(`${base}dashboard-current.json?${cacheKey}`);
              assert(manifest.dashboardBuildId === '20260623-backend-contract-1', `manifest dashboardBuildId mismatch: ${manifest.dashboardBuildId}`);
              assert(manifest.appBuildId === '20260622-visual-restore-1', `manifest appBuildId mismatch: ${manifest.appBuildId}`);
              assert(manifest.currentApp === 'app-20260623-backend-contract-1.html', `manifest currentApp mismatch: ${manifest.currentApp}`);

              const appHtml = await fetchText(`${base}${manifest.currentApp}?${cacheKey}`);
              assert(appHtml.response.ok, `${manifest.currentApp} HTTP ${appHtml.response.status}`);
              assert(appHtml.text.includes('main-styles.css?build=20260622-visual-restore-1'), 'app html did not reference restored CSS asset');
              assert(appHtml.text.includes('dashboard-hermes-bridge.js?build=20260622-visual-restore-1'), 'app html did not reference Hermes bridge asset');
              assert(appHtml.text.includes('dashboard-app.js?build=20260622-visual-restore-1'), 'app html did not reference dashboard app JS asset');
              assert(appHtml.text.includes('dashboard-visual-state-hydrator.js?build=20260623-backend-contract-1'), 'app html did not reference visual workflow hydrator');
              assertNoOldBrowserWritePath('app html', appHtml.text);

              const bridge = await fetchText(`${base}dashboard-hermes-bridge.js?${cacheKey}`);
              assert(bridge.response.ok, `dashboard-hermes-bridge.js HTTP ${bridge.response.status}`);
              assert(bridge.text.includes('__MISSION_CONTROL_HERMES__'), 'Hermes bridge missing global bridge object');
              assert(bridge.text.includes('/api/sync'), 'Hermes bridge missing sync endpoint');
              assert(bridge.text.includes('/api/dashboard-intents'), 'Hermes bridge missing dashboard intent endpoint');
              assertNoOldBrowserWritePath('Hermes bridge', bridge.text);

              const app = await fetchText(`${base}dashboard-app.js?${cacheKey}`);
              assert(app.response.ok, `dashboard-app.js HTTP ${app.response.status}`);
              assert(app.text.includes("BUILD_ID = '20260622-visual-restore-1'"), 'dashboard app missing expected internal build id');
              assert(app.text.includes("cache: 'no-store'"), 'dashboard app missing no-store data fetch');
              assert(app.text.includes("url.searchParams.set('t'"), 'dashboard app missing timestamp cache buster');
              assertNoOldBrowserWritePath('dashboard app', app.text);

              const hydrator = await fetchText(`${base}dashboard-visual-state-hydrator.js?${cacheKey}`);
              assert(hydrator.response.ok, `dashboard-visual-state-hydrator.js HTTP ${hydrator.response.status}`);
              assert(hydrator.text.includes('visualWorkflowState'), 'visual hydrator missing visualWorkflowState');
              assert(hydrator.text.includes('priorityQueueOrder'), 'visual hydrator missing priorityQueueOrder');
              assert(hydrator.text.includes('agentBoards'), 'visual hydrator missing agentBoards');

              const data = await jsonFrom(`${base}data.json?${cacheKey}`);
              verifySnapshot(data);
              console.log('Live Mission Control verified: bootloader, manifest, app html, assets, Hermes bridge, visual workflow hydrator, C4, 22 projects, 106 tasks, 29 done.');
              process.exit(0);
            } catch (error) {
              lastError = error;
              console.log(`Attempt ${attempt} failed: ${error.message}`);
              await sleep(15000);
            }
          }
          throw lastError;
          NODE
