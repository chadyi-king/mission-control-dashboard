name: Verify Live Mission Control Dashboard

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Sync Dashboard Publishing Branch
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  verify-live:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      EXPECTED_SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      DASHBOARD_URL: https://chadyi-king.github.io/mission-control-dashboard/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ github.token }}

      - name: Install Playwright browser
        run: |
          set -euo pipefail
          mkdir -p /tmp/mission-control-playwright
          cd /tmp/mission-control-playwright
          npm init -y >/dev/null 2>&1
          npm install playwright@latest >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Verify public root URL runtime
        id: runtime
        working-directory: /tmp/mission-control-playwright
        env:
          PROOF_PATH: ${{ github.workspace }}/diagnostics/live-runtime-proof-latest.json
          EXIT_CODE_PATH: ${{ github.workspace }}/diagnostics/live-runtime-exit-code.txt
        run: |
          set +e
          mkdir -p "${GITHUB_WORKSPACE}/diagnostics"
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const { chromium } = require('playwright');

          const base = process.env.DASHBOARD_URL;
          const expectedSourceSha = process.env.EXPECTED_SOURCE_SHA || '';
          const proofPath = process.env.PROOF_PATH;
          const forbidden = /GitHub PAT|Personal Access Token|api\.github\.com|Mark Done to persist|Failed to load data/i;
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const aliases = {
            backlog: 'open', pending: 'open', todo: 'open', review: 'needs_review',
            check_this: 'needs_review', waiting_on_you: 'input_requested', needs_input: 'input_requested',
            in_progress: 'active'
          };
          const normalizeStatus = (status) => {
            const raw = String(status || 'open').trim().toLowerCase().replace(/[\s-]+/g, '_');
            return aliases[raw] || raw || 'open';
          };
          const verifyData = (data) => {
            const tasks = Object.entries(data.tasks || {})
              .filter(([, task]) => task && typeof task === 'object')
              .map(([id, task]) => ({ id: task.id || id, ...task }));
            const visible = tasks.filter((task) => normalizeStatus(task.status) !== 'removed');
            const done = visible.filter((task) => normalizeStatus(task.status) === 'done');
            const projects = new Set();
            Object.keys(data.projects || {}).forEach((id) => projects.add(String(id).toUpperCase()));
            Object.keys(data.projectDetails || {}).forEach((id) => projects.add(String(id).toUpperCase()));
            Object.values(data.categories || {}).forEach((category) => (category.projects || []).forEach((id) => projects.add(String(id).toUpperCase())));
            visible.forEach((task) => { if (task.project) projects.add(String(task.project).toUpperCase()); });
            const c4 = (data.projects || {}).C4 || (data.projectDetails || {}).C4 || {};
            return { projects: projects.size, visible: visible.length, done: done.length, c4Name: c4.name };
          };
          const writeProof = (proof) => {
            fs.writeFileSync(proofPath, JSON.stringify(proof, null, 2) + '\n');
          };

          (async () => {
            let lastProof = null;
            for (let attempt = 1; attempt <= 40; attempt += 1) {
              const browser = await chromium.launch({ headless: true });
              const context = await browser.newContext({ serviceWorkers: 'block', viewport: { width: 1440, height: 1100 } });
              const page = await context.newPage();
              const proof = {
                kind: 'mission-control-live-runtime-proof',
                generatedAt: new Date().toISOString(),
                attempt,
                url: base,
                expectedSourceSha,
                pass: false,
                checks: {},
                observed: {},
                errors: []
              };
              try {
                const response = await page.goto(base, { waitUntil: 'domcontentloaded', timeout: 30000 });
                proof.observed.rootStatus = response ? response.status() : null;
                await page.waitForTimeout(3500);
                await page.waitForFunction(() => {
                  const text = document.body ? document.body.innerText : '';
                  return text.includes('SNAPSHOT LIVE') || text.includes('DATA ERROR') || text.includes('GitHub Personal Access Token') || text.includes('Failed to load data');
                }, { timeout: 45000 }).catch(() => null);

                const dom = await page.evaluate(() => {
                  const text = document.body ? document.body.innerText : '';
                  const q = (selector) => document.querySelector(selector)?.textContent?.trim() || '';
                  return {
                    title: document.title,
                    text,
                    textSample: text.slice(0, 1800),
                    syncChip: q('#sync-chip'),
                    statTotal: q('#stat-total'),
                    statDone: q('#stat-done'),
                    statProjects: q('#stat-projects'),
                    statC4: q('#stat-c4'),
                    buildId: q('#build-id'),
                    resourceNames: performance.getEntriesByType('resource').map((entry) => entry.name).slice(-80)
                  };
                });
                proof.observed.dom = {
                  title: dom.title,
                  syncChip: dom.syncChip,
                  statTotal: dom.statTotal,
                  statDone: dom.statDone,
                  statProjects: dom.statProjects,
                  statC4: dom.statC4,
                  buildId: dom.buildId,
                  textSample: dom.textSample,
                  resourceNames: dom.resourceNames
                };

                const proofResponse = await context.request.get(new URL('deployment-proof.json', base).toString(), {
                  headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                proof.observed.proofStatus = proofResponse.status();
                const deploymentProof = await proofResponse.json();
                proof.observed.deploymentProof = deploymentProof;

                const manifestResponse = await context.request.get(new URL('dashboard-current.json', base).toString(), {
                  headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                proof.observed.manifestStatus = manifestResponse.status();
                const manifest = await manifestResponse.json();
                proof.observed.manifest = manifest;

                const dataResponse = await context.request.get(new URL(manifest.dataSnapshot || 'data.json', base).toString(), {
                  headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                proof.observed.dataStatus = dataResponse.status();
                const dataText = await dataResponse.text();
                const data = JSON.parse(dataText);
                const stats = verifyData(data);
                proof.observed.dataSha256 = crypto.createHash('sha256').update(dataText).digest('hex');
                proof.observed.stats = stats;

                proof.checks.rootHttpOk = proof.observed.rootStatus === 200;
                proof.checks.noOldPatUi = !forbidden.test(dom.text);
                proof.checks.snapshotLive = dom.syncChip === 'SNAPSHOT LIVE' || dom.text.includes('SNAPSHOT LIVE');
                proof.checks.projects22 = String(dom.statProjects).trim() === '22' && stats.projects >= 22;
                proof.checks.visible106 = String(dom.statTotal).trim() === '106' && stats.visible === 106;
                proof.checks.done29 = String(dom.statDone).trim() === '29' && stats.done === 29;
                proof.checks.c4Visible = /\bC4\b/.test(dom.text) && /Website Services/.test(dom.text) && stats.c4Name === 'Website Services';
                proof.checks.proofKind = deploymentProof.kind === 'mission-control-dashboard-deployment-proof';
                proof.checks.proofSourceSha = !expectedSourceSha || deploymentProof.sourceSha === expectedSourceSha;
                proof.checks.proofDataHash = !deploymentProof.dataSha256 || deploymentProof.dataSha256 === proof.observed.dataSha256;
                proof.checks.branchDeployment = deploymentProof.publishedBy === 'sync-dashboard-branches.yml' && deploymentProof.deploymentMode === 'legacy-gh-pages-branch';
                proof.checks.currentAppLoaded = dom.resourceNames.some((name) => name.includes(manifest.currentApp));
                proof.checks.dataLoaded = dom.resourceNames.some((name) => name.includes(manifest.dataSnapshot || 'data.json'));

                const failed = Object.entries(proof.checks).filter(([, value]) => !value).map(([key]) => key);
                if (failed.length) throw new Error(`failed checks: ${failed.join(', ')}`);

                proof.pass = true;
                writeProof(proof);
                console.log(`Live root runtime verified: ${stats.projects} projects / ${stats.visible} visible tasks / ${stats.done} done / C4 Website Services`);
                await browser.close();
                return;
              } catch (error) {
                proof.errors.push(error.message || String(error));
                lastProof = proof;
                writeProof(proof);
                console.log(`Attempt ${attempt} failed: ${proof.errors.join('; ')}`);
                await browser.close().catch(() => null);
                if (attempt < 40) await sleep(15000);
              }
            }
            writeProof(lastProof || { kind: 'mission-control-live-runtime-proof', pass: false, errors: ['no proof collected'] });
            process.exit(1);
          })().catch((error) => {
            writeProof({ kind: 'mission-control-live-runtime-proof', pass: false, generatedAt: new Date().toISOString(), url: base, expectedSourceSha, errors: [error.message || String(error)] });
            process.exit(1);
          });
          NODE
          code=$?
          echo "$code" > "${EXIT_CODE_PATH}"
          exit 0

      - name: Commit live runtime proof
        if: always()
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/live-runtime-proof-latest.json diagnostics/live-runtime-exit-code.txt || true
          if git diff --cached --quiet; then
            echo 'No live runtime proof changes to commit.'
          else
            git commit -m 'Capture live dashboard runtime proof'
            git push origin HEAD:main
          fi

      - name: Fail if live runtime proof failed
        if: always()
        run: |
          code=$(cat diagnostics/live-runtime-exit-code.txt 2>/dev/null || echo 1)
          if [ "$code" != "0" ]; then
            echo 'Live root URL did not verify. See diagnostics/live-runtime-proof-latest.json.'
            exit "$code"
          fi
