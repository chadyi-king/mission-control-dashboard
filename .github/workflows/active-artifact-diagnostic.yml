name: Diagnose Active Dashboard Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/active-artifact-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnose-active-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ github.token }}

      - name: Validate active artifact without failing job
        env:
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');
          const report = {
            kind: 'mission-control-active-artifact-validation',
            generatedAt: new Date().toISOString(),
            sourceSha: process.env.SHA,
            runId: process.env.RUN_ID,
            ok: false,
            steps: [],
            error: null
          };
          const note = (step, extra = {}) => report.steps.push({ step, ...extra });
          try {
            const source = process.cwd();
            const site = path.join(source, 'public-diagnostic');
            fs.rmSync(site, { recursive: true, force: true });
            fs.mkdirSync(site, { recursive: true });
            const forbidden = /GitHub PAT|Personal Access Token|Mark Done to persist/i;
            const fail = (message) => { throw new Error(message); };
            const exists = (file) => fs.existsSync(path.join(source, file));
            const read = (file) => fs.readFileSync(path.join(source, file), 'utf8');
            const readJson = (file) => JSON.parse(read(file));
            const copyFile = (file) => {
              if (!exists(file)) fail(`missing ${file}`);
              fs.copyFileSync(path.join(source, file), path.join(site, file));
              note('copied-file', { file });
            };
            const copyDir = (dir) => {
              const from = path.join(source, dir);
              if (!fs.existsSync(from)) return;
              fs.cpSync(from, path.join(site, dir), { recursive: true });
              note('copied-dir', { dir });
            };
            const stripQuery = (value) => String(value || '').split('?')[0].split('#')[0];
            const addAssetRefs = (html, files) => {
              const re = /(?:src|href)=["']([^"']+)["']/gi;
              let match;
              while ((match = re.exec(html))) {
                const raw = match[1];
                if (!raw || /^https?:|^data:|^\/\//i.test(raw)) continue;
                const file = stripQuery(raw).replace(/^\.\//, '');
                if (/\.(js|css)$/i.test(file)) files.add(file);
              }
            };

            const manifest = readJson('dashboard-current.json');
            report.manifest = manifest;
            if (manifest.kind !== 'mission-control-dashboard-current-app') fail('dashboard-current.json kind mismatch');
            if (!manifest.currentApp) fail('dashboard-current.json missing currentApp');
            if (/layout-v2/i.test(manifest.currentApp) && !/visual-pass/i.test(String(manifest.qaStatus || ''))) fail(`refusing unverified layout-v2 ${manifest.currentApp}`);

            const appHtml = read(manifest.currentApp);
            if (forbidden.test(read('index.html'))) fail('index.html contains old browser write/PAT pattern');
            if (forbidden.test(appHtml)) fail(`${manifest.currentApp} contains old browser write/PAT pattern`);
            if (!appHtml.includes('dashboard-fresh-data-source.js')) fail(`${manifest.currentApp} missing dashboard-fresh-data-source.js`);
            if (!appHtml.includes('dashboard-app-20260623-cachebreak-1.js')) fail(`${manifest.currentApp} missing stable dashboard JS`);
            if (!appHtml.includes('main-styles-20260623-p5.css')) fail(`${manifest.currentApp} missing stable dashboard CSS`);

            const files = new Set(['index.html', 'dashboard-current.json', manifest.currentApp, manifest.dataSnapshot || 'data.json', 'service-worker.js', 'sw.js']);
            addAssetRefs(appHtml, files);
            report.includedFiles = Array.from(files).sort();
            for (const file of files) copyFile(file);
            copyDir('assets');
            fs.writeFileSync(path.join(site, '.nojekyll'), '');

            for (const file of files) {
              if (/\.(html|js)$/i.test(file) && forbidden.test(fs.readFileSync(path.join(site, file), 'utf8'))) fail(`${file} contains old browser write/PAT pattern`);
            }

            const aliases = { backlog: 'open', pending: 'open', todo: 'open', review: 'needs_review', check_this: 'needs_review', waiting_on_you: 'input_requested', needs_input: 'input_requested', in_progress: 'active' };
            const normalizeStatus = (status) => {
              const raw = String(status || 'open').trim().toLowerCase().replace(/[\s-]+/g, '_');
              return aliases[raw] || raw || 'open';
            };
            const dataPath = manifest.dataSnapshot || 'data.json';
            const dataText = fs.readFileSync(path.join(site, dataPath), 'utf8');
            const data = JSON.parse(dataText);
            const tasks = Object.entries(data.tasks || {}).filter(([, task]) => task && typeof task === 'object').map(([id, task]) => ({ id, ...task }));
            const visible = tasks.filter((task) => normalizeStatus(task.status) !== 'removed');
            const done = visible.filter((task) => normalizeStatus(task.status) === 'done');
            const projects = new Set();
            Object.keys(data.projects || {}).forEach((id) => projects.add(String(id).toUpperCase()));
            Object.keys(data.projectDetails || {}).forEach((id) => projects.add(String(id).toUpperCase()));
            Object.values(data.categories || {}).forEach((category) => (category.projects || []).forEach((id) => projects.add(String(id).toUpperCase())));
            visible.forEach((task) => { if (task.project) projects.add(String(task.project).toUpperCase()); });
            const c4 = (data.projects || {}).C4 || (data.projectDetails || {}).C4 || {};
            if (projects.size < 22) fail(`expected at least 22 projects, found ${projects.size}`);
            if (!projects.has('C4')) fail('missing C4');
            if (c4.name !== 'Website Services') fail(`expected C4 Website Services, found ${JSON.stringify(c4.name)}`);
            if (!visible.length) fail('no visible tasks found');
            if (done.length > visible.length) fail('done task count exceeds visible task count');
            report.counts = { projects: projects.size, visibleTasks: visible.length, doneTasks: done.length, c4Name: c4.name };
            report.dataSha256 = crypto.createHash('sha256').update(dataText).digest('hex');
            report.ok = true;
          } catch (error) {
            report.ok = false;
            report.error = { message: error.message || String(error), stack: error.stack || '' };
          }
          fs.writeFileSync('diagnostics/active-artifact-validation-latest.json', JSON.stringify(report, null, 2) + '\n');
          NODE

      - name: Commit active artifact diagnostic report
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/active-artifact-validation-latest.json
          if git diff --cached --quiet; then
            echo 'No active artifact diagnostic changes to commit.'
          else
            git commit -m 'Capture active dashboard artifact diagnostic'
            git push origin HEAD:main
          fi
