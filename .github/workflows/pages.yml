name: Archived - Pages Artifact Deployment Disabled

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain active publisher
        run: |
          echo 'This workflow is intentionally disabled.'
          echo 'GitHub Pages is configured as deploy-from-branch using gh-pages / root.'
          echo 'The active publisher is .github/workflows/sync-dashboard-branches.yml.'
          echo 'That workflow builds a clean gh-pages branch from main and then the live verifier checks the public root URL.'
