name: Deploy Mission Control Dashboard

on:
  push:
    branches:
      - main
      - gh-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed dashboard source
        uses: actions/checkout@v7
        with:
          ref: gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Read dashboard manifest
        id: manifest
        run: |
          node <<'NODE'
          const fs = require('fs');
          const current = JSON.parse(fs.readFileSync('dashboard-current.json', 'utf8'));
          const marker = JSON.parse(fs.readFileSync('mission-control-build.json', 'utf8'));

          // Extract build IDs and app file from manifest (source of truth)
          const dashboardBuildId = current.dashboardBuildId || marker.dashboardBuildId;
          const appBuildId = current.appBuildId || marker.appBuildId;
          const currentApp = current.currentApp || marker.currentApp;

          if (!currentApp) throw new Error('dashboard-current.json missing currentApp');
          if (!appBuildId) throw new Error('dashboard-current.json missing appBuildId');
          if (!dashboardBuildId) throw new Error('dashboard-current.json missing dashboardBuildId');

          // Determine the visual app file from the backend contract wrapper
          let visualAppFile = null;
          if (fs.existsSync(currentApp)) {
            const appHtml = fs.readFileSync(currentApp, 'utf8');
            const match = appHtml.match(/LEGACY_VISUAL_APP\s*=\s*['"]([^'"]+)['"]/);
            if (match) visualAppFile = match[1];
          }

          // Determine JS file name: either versioned or plain dashboard-app.js
          const versionedJs = `dashboard-app-${appBuildId}.js`;
          const jsFile = fs.existsSync(versionedJs) ? versionedJs : 'dashboard-app.js';

          // Output for subsequent steps
          console.log(`DASHBOARD_BUILD_ID=${dashboardBuildId}`);
          console.log(`DASHBOARD_ASSET_BUILD_ID=${appBuildId}`);
          console.log(`DASHBOARD_APP_FILE=${currentApp}`);
          console.log(`VISUAL_APP_FILE=${visualAppFile || ''}`);
          console.log(`JS_FILE=${jsFile}`);

          // Write to GITHUB_OUTPUT
          const output = process.env.GITHUB_OUTPUT;
          if (output) {
            fs.appendFileSync(output, `DASHBOARD_BUILD_ID=${dashboardBuildId}\n`);
            fs.appendFileSync(output, `DASHBOARD_ASSET_BUILD_ID=${appBuildId}\n`);
            fs.appendFileSync(output, `DASHBOARD_APP_FILE=${currentApp}\n`);
            fs.appendFileSync(output, `VISUAL_APP_FILE=${visualAppFile || ''}\n`);
            fs.appendFileSync(output, `JS_FILE=${jsFile}\n`);
          }
          NODE

      - name: Prepare static dashboard artifact
        env:
          JS_FILE: ${{ steps.manifest.outputs.JS_FILE }}
          DASHBOARD_APP_FILE: ${{ steps.manifest.outputs.DASHBOARD_APP_FILE }}
          VISUAL_APP_FILE: ${{ steps.manifest.outputs.VISUAL_APP_FILE }}
        run: |
          rm -rf _site
          mkdir -p _site

          # Core files always copied
          cp index.html main-styles.css dashboard-hermes-bridge.js dashboard-visual-state-hydrator.js data.json mission-control-build.json dashboard-current.json .nojekyll _site/

          # Copy the JS file (either versioned or plain)
          if [ -f "${JS_FILE}" ]; then
            cp "${JS_FILE}" "_site/${JS_FILE}"
            # Also copy as dashboard-app.js for backward compatibility if versioned
            if [ "${JS_FILE}" != "dashboard-app.js" ]; then
              cp "${JS_FILE}" _site/dashboard-app.js
            fi
          else
            echo "ERROR: JS file ${JS_FILE} not found"
            exit 1
          fi

          # Copy the backend contract wrapper app
          if [ -f "${DASHBOARD_APP_FILE}" ]; then
            cp "${DASHBOARD_APP_FILE}" "_site/${DASHBOARD_APP_FILE}"
          else
            echo "ERROR: App file ${DASHBOARD_APP_FILE} not found"
            exit 1
          fi

          # Copy the visual app file if different from wrapper
          if [ -n "${VISUAL_APP_FILE}" ] && [ "${VISUAL_APP_FILE}" != "${DASHBOARD_APP_FILE}" ] && [ -f "${VISUAL_APP_FILE}" ]; then
            cp "${VISUAL_APP_FILE}" "_site/${VISUAL_APP_FILE}"
          fi

          # Copy assets if present
          if [ -d assets ]; then cp -R assets _site/assets; fi

          echo "Artifact prepared:"
          ls -la _site/

      - name: Normalize and sanitize public dashboard snapshot
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = '_site/data.json';
          const sensitive = new Set([
            'account_id', 'accountid', 'api_key', 'apikey', 'access_token', 'accesstoken',
            'refresh_token', 'refreshtoken', 'token', 'secret', 'password', 'credential', 'credentials'
          ]);
          const aliases = {
            backlog: 'open', pending: 'open', todo: 'open', review: 'needs_review',
            check_this: 'needs_review', 'waiting_on_you': 'input_requested', 'waiting on you': 'input_requested',
            needs_input: 'input_requested', in_progress: 'active', 'agent on it': 'active', 'check this': 'needs_review'
          };
          const canonicalBuckets = ['open', 'active', 'input_requested', 'needs_review', 'blocked', 'paused', 'done'];
          const normalizeKey = (key) => String(key).trim().toLowerCase().replace(/[\s-]+/g, '_');
          const normalizeStatus = (status) => {
            const raw = String(status || 'open').trim().toLowerCase().replace(/[\s-]+/g, '_');
            return aliases[raw] || raw || 'open';
          };
          const sanitize = (value) => {
            if (Array.isArray(value)) return value.map(sanitize);
            if (value && typeof value === 'object') {
              return Object.fromEntries(Object.entries(value)
                .filter(([key]) => {
                  const name = normalizeKey(key);
                  return !sensitive.has(name) && !sensitive.has(name.replace(/_/g, ''));
                })
                .map(([key, item]) => [key, sanitize(item)]));
            }
            return value;
          };
          const taskEntries = (snapshot) => {
            const tasks = snapshot.tasks || {};
            if (Array.isArray(tasks)) return tasks.map((task, index) => [task?.id || `task-${index + 1}`, task]).filter(([, task]) => task && typeof task === 'object');
            return Object.entries(tasks).filter(([, task]) => task && typeof task === 'object');
          };
          const normalizeTasks = (snapshot) => {
            for (const [id, task] of taskEntries(snapshot)) {
              task.id = task.id || id;
              task.status = normalizeStatus(task.status);
            }
          };
          const visibleTasks = (snapshot) => taskEntries(snapshot)
            .map(([id, task]) => ({ id: task.id || id, ...task }))
            .filter((task) => normalizeStatus(task.status) !== 'removed');
          const deriveWorkflow = (snapshot) => {
            const workflow = Object.fromEntries(canonicalBuckets.map((bucket) => [bucket, []]));
            workflow.urgent = [];
            for (const task of visibleTasks(snapshot)) {
              const status = canonicalBuckets.includes(normalizeStatus(task.status)) ? normalizeStatus(task.status) : 'open';
              workflow[status].push(task.id);
              const priority = String(task.priority || '').trim().toLowerCase();
              if (['critical', 'urgent', 'high'].includes(priority) && status !== 'done') workflow.urgent.push(task.id);
            }
            return workflow;
          };
          const deriveStats = (snapshot) => {
            const existing = snapshot.stats || {};
            const tasks = visibleTasks(snapshot);
            const count = (status) => tasks.filter((task) => normalizeStatus(task.status) === status).length;
            const done = count('done');
            const keep = Object.fromEntries(Object.entries(existing).filter(([key]) => ![
              'totalTasks', 'tasksLeft', 'completedTasks', 'backlog', 'pending', 'review', 'todo',
              'open', 'active', 'blocked', 'needsReview', 'inputRequested', 'paused'
            ].includes(key)));
            return {
              ...keep,
              totalTasks: tasks.length,
              tasksLeft: tasks.length - done,
              completedTasks: done,
              open: count('open'),
              active: count('active'),
              blocked: count('blocked'),
              needsReview: count('needs_review'),
              inputRequested: count('input_requested'),
              paused: count('paused')
            };
          };

          const data = sanitize(JSON.parse(fs.readFileSync(file, 'utf8')));
          normalizeTasks(data);
          data.workflow = deriveWorkflow(data);
          data.stats = deriveStats(data);
          data.visualWorkflowState = data.visualWorkflowState || { priorityQueueOrder: [], agentBoards: {} };
          data.canonicalState = {
            ...(data.canonicalState || {}),
            dashboardDataRole: 'generated sanitized snapshot',
            publicSnapshotSanitized: true,
            workflowBucketsNormalized: true,
            visualWorkflowStatePublished: true
          };
          fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          NODE

      - name: Verify bootloader backend contract artifact
        run: |
          node <<'NODE'
          const fs = require('fs');

          // Read manifest first (source of truth)
          const current = JSON.parse(fs.readFileSync('_site/dashboard-current.json', 'utf8'));
          const marker = JSON.parse(fs.readFileSync('_site/mission-control-build.json', 'utf8'));

          const dashboardBuildId = current.dashboardBuildId || marker.dashboardBuildId;
          const assetBuildId = current.appBuildId || marker.appBuildId;
          const appFile = current.currentApp || marker.currentApp;

          if (!appFile) throw new Error('dashboard-current.json missing currentApp');
          if (!assetBuildId) throw new Error('dashboard-current.json missing appBuildId');
          if (!dashboardBuildId) throw new Error('dashboard-current.json missing dashboardBuildId');

          console.log(`Verifying dashboard manifest:`);
          console.log(`  currentApp: ${appFile}`);
          console.log(`  appBuildId: ${assetBuildId}`);
          console.log(`  dashboardBuildId: ${dashboardBuildId}`);

          const failures = [];

          // 1. Check required core files exist
          const requiredFiles = [
            'index.html', 'main-styles.css', 'dashboard-hermes-bridge.js',
            'dashboard-visual-state-hydrator.js', 'data.json', 'mission-control-build.json',
            'dashboard-current.json', '.nojekyll'
          ];
          for (const file of requiredFiles) {
            if (!fs.existsSync(`_site/${file}`)) failures.push(`missing artifact file: ${file}`);
          }

          // 2. Check the backend contract wrapper app exists
          if (!fs.existsSync(`_site/${appFile}`)) {
            failures.push(`missing app file: ${appFile}`);
          }

          // 3. Read app file and determine visual app + JS file
          let visualAppFile = null;
          let jsFile = 'dashboard-app.js';
          const versionedJs = `dashboard-app-${assetBuildId}.js`;

          if (fs.existsSync(`_site/${appFile}`)) {
            const appHtml = fs.readFileSync(`_site/${appFile}`, 'utf8');

            // Check wrapper references correct hydrator build
            if (!appHtml.includes(`dashboard-visual-state-hydrator.js?build=${dashboardBuildId}`)) {
              failures.push(`${appFile} missing hydrator reference with build=${dashboardBuildId}`);
            }

            // Extract LEGACY_VISUAL_APP to find the visual app file
            const visualMatch = appHtml.match(/LEGACY_VISUAL_APP\s*=\s*['"]([^'"]+)['"]/);
            if (visualMatch) {
              visualAppFile = visualMatch[1];
              console.log(`  visualApp: ${visualAppFile}`);
            }
          }

          // 4. Determine which JS file is being used
          if (fs.existsSync(`_site/${versionedJs}`)) {
            jsFile = versionedJs;
          } else if (!fs.existsSync(`_site/dashboard-app.js`)) {
            failures.push(`missing JS file: neither ${versionedJs} nor dashboard-app.js found`);
          }
          console.log(`  jsFile: ${jsFile}`);

          // 5. Check visual app file if different from wrapper
          if (visualAppFile && visualAppFile !== appFile) {
            if (!fs.existsSync(`_site/${visualAppFile}`)) {
              failures.push(`missing visual app file: ${visualAppFile}`);
            } else {
              const visualHtml = fs.readFileSync(`_site/${visualAppFile}`, 'utf8');

              // Check visual app references CSS with correct build
              if (!visualHtml.includes(`main-styles.css?build=${assetBuildId}`)) {
                failures.push(`${visualAppFile} missing main-styles.css?build=${assetBuildId}`);
              }

              // Check visual app references JS (either versioned or with query string)
              const hasVersionedJs = visualHtml.includes(jsFile);
              const hasQueryJs = visualHtml.includes(`dashboard-app.js?build=${assetBuildId}`);
              if (!hasVersionedJs && !hasQueryJs) {
                failures.push(`${visualAppFile} missing JS reference (expected ${jsFile} or dashboard-app.js?build=${assetBuildId})`);
              }
            }
          }

          // 6. Check JS file content
          if (fs.existsSync(`_site/${jsFile}`)) {
            const appJs = fs.readFileSync(`_site/${jsFile}`, 'utf8');

            if (!appJs.includes(`BUILD_ID = '${assetBuildId}'`)) {
              failures.push(`${jsFile} missing BUILD_ID = '${assetBuildId}'`);
            }
            if (!appJs.includes("cache: 'no-store'")) {
              failures.push(`${jsFile} missing cache: 'no-store'`);
            }
            if (!appJs.includes('const AGENT_VISUALS')) {
              failures.push(`${jsFile} missing AGENT_VISUALS`);
            }
          }

          // 7. Check other core files
          const html = fs.readFileSync('_site/index.html', 'utf8');
          const styles = fs.readFileSync('_site/main-styles.css', 'utf8');
          const bridge = fs.readFileSync('_site/dashboard-hermes-bridge.js', 'utf8');
          const hydrator = fs.readFileSync('_site/dashboard-visual-state-hydrator.js', 'utf8');

          const mustContain = [
            ['index.html', html, 'dashboard-current.json'],
            ['index.html', html, appFile],
            ['main-styles.css', styles, '.agent-rail'],
            ['main-styles.css', styles, '.fleet-grid'],
            ['dashboard-hermes-bridge.js', bridge, '__MISSION_CONTROL_HERMES__'],
            ['dashboard-hermes-bridge.js', bridge, '/api/sync'],
            ['dashboard-hermes-bridge.js', bridge, '/api/dashboard-intents'],
            ['dashboard-visual-state-hydrator.js', hydrator, 'visualWorkflowState'],
            ['dashboard-visual-state-hydrator.js', hydrator, 'priorityQueueOrder'],
            ['dashboard-visual-state-hydrator.js', hydrator, 'agentBoards']
          ];
          for (const [file, body, needle] of mustContain) {
            if (!body.includes(needle)) failures.push(`${file} missing ${needle}`);
          }

          // 8. Check for forbidden patterns (old dashboard write code)
          const forbiddenPatterns = [
            ['index.html', html, /api\.github\.com|localStorage|GitHub PAT|Personal Access Token/i],
            ['dashboard-hermes-bridge.js', bridge, /api\.github\.com|GitHub PAT|Personal Access Token/i],
            [jsFile, fs.existsSync(`_site/${jsFile}`) ? fs.readFileSync(`_site/${jsFile}`, 'utf8') : '', /api\.github\.com|GitHub PAT|Personal Access Token/i]
          ];
          for (const [file, body, pattern] of forbiddenPatterns) {
            if (pattern.test(body)) failures.push(`${file} contains old dashboard write/cache/source-of-truth pattern: ${pattern}`);
          }

          // 9. Verify data.json counts
          const data = JSON.parse(fs.readFileSync('_site/data.json', 'utf8'));

          const aliases = {
            backlog: 'open', pending: 'open', todo: 'open', review: 'needs_review',
            check_this: 'needs_review', waiting_on_you: 'input_requested', needs_input: 'input_requested',
            in_progress: 'active'
          };
          const normalizeStatus = (status) => {
            const raw = String(status || 'open').trim().toLowerCase().replace(/[\s-]+/g, '_');
            return aliases[raw] || raw || 'open';
          };
          const tasks = Object.entries(data.tasks || {})
            .filter(([, task]) => task && typeof task === 'object')
            .map(([id, task]) => ({ id: task.id || id, ...task }))
            .filter((task) => normalizeStatus(task.status) !== 'removed');
          const done = tasks.filter((task) => normalizeStatus(task.status) === 'done');
          const projects = new Set();
          Object.keys(data.projects || {}).forEach((id) => projects.add(String(id).toUpperCase()));
          Object.keys(data.projectDetails || {}).forEach((id) => projects.add(String(id).toUpperCase()));
          Object.values(data.categories || {}).forEach((category) => (category.projects || []).forEach((id) => projects.add(String(id).toUpperCase())));
          tasks.forEach((task) => { if (task.project) projects.add(String(task.project).toUpperCase()); });
          const c4 = (data.projects || {}).C4 || (data.projectDetails || {}).C4 || {};

          if (projects.size !== 22) failures.push(`expected 22 projects, found ${projects.size}`);
          if (!projects.has('C4')) failures.push('missing C4');
          if (c4.name !== 'Website Services') failures.push(`expected C4 Website Services, found ${JSON.stringify(c4.name)}`);
          if (tasks.length !== 106) failures.push(`expected 106 visible tasks, found ${tasks.length}`);
          if (done.length !== 29) failures.push(`expected 29 done tasks, found ${done.length}`);

          // 10. Verify manifest consistency
          if (marker.kind !== 'mission-control-dashboard-build-marker') failures.push('build marker kind mismatch');
          if (current.kind !== 'mission-control-dashboard-current-app') failures.push('dashboard-current kind mismatch');

          // 11. Check for legacy status keys
          const legacyPublicKeys = new Set(['backlog', 'pending', 'review', 'todo', 'in_progress']);
          const legacyTaskStatuses = [...new Set(tasks.map((task) => String(task.status || '').trim().toLowerCase().replace(/[\s-]+/g, '_')).filter((status) => legacyPublicKeys.has(status)))];
          const legacyWorkflowKeys = Object.keys(data.workflow || {}).filter((key) => legacyPublicKeys.has(String(key).trim().toLowerCase().replace(/[\s-]+/g, '_')));
          const legacyStatsKeys = Object.keys(data.stats || {}).filter((key) => legacyPublicKeys.has(String(key).trim().toLowerCase().replace(/[\s-]+/g, '_')));
          if (legacyTaskStatuses.length) failures.push(`legacy task statuses remain: ${legacyTaskStatuses.join(', ')}`);
          if (legacyWorkflowKeys.length) failures.push(`legacy workflow buckets remain: ${legacyWorkflowKeys.join(', ')}`);
          if (legacyStatsKeys.length) failures.push(`legacy stats keys remain: ${legacyStatsKeys.join(', ')}`);
          for (const bucket of ['open', 'active', 'input_requested', 'needs_review', 'blocked', 'paused', 'done']) {
            if (!Array.isArray(data.workflow?.[bucket])) failures.push(`missing canonical workflow bucket: ${bucket}`);
          }
          if (!data.visualWorkflowState || typeof data.visualWorkflowState !== 'object') failures.push('missing visualWorkflowState');

          // 12. Check for sensitive data
          const sensitive = new Set([
            'account_id', 'accountid', 'api_key', 'apikey', 'access_token', 'accesstoken',
            'refresh_token', 'refreshtoken', 'token', 'secret', 'password', 'credential', 'credentials'
          ]);
          const normalizeKey = (key) => String(key).trim().toLowerCase().replace(/[\s-]+/g, '_');
          const sensitivePaths = (value, path = 'root') => {
            const found = [];
            if (Array.isArray(value)) value.forEach((item, index) => found.push(...sensitivePaths(item, `${path}[${index}]`)));
            else if (value && typeof value === 'object') {
              Object.entries(value).forEach(([key, item]) => {
                const name = normalizeKey(key);
                if (sensitive.has(name) || sensitive.has(name.replace(/_/g, ''))) found.push(`${path}.${key}`);
                found.push(...sensitivePaths(item, `${path}.${key}`));
              });
            }
            return found;
          };
          const sensitiveFound = sensitivePaths(data);
          if (sensitiveFound.length) failures.push(`sensitive public keys remain: ${sensitiveFound.slice(0, 5).join(', ')}`);

          // Report results
          if (failures.length) {
            console.error(`\nVerification FAILED with ${failures.length} error(s):`);
            console.error(failures.map((failure) => `  - ${failure}`).join('\n'));
            process.exit(1);
          }

          console.log('\nVerification PASSED:');
          console.log(`  - App file: ${appFile}`);
          console.log(`  - Visual app: ${visualAppFile || '(same as app)'}`);
          console.log(`  - JS file: ${jsFile}`);
          console.log(`  - Build ID: ${assetBuildId}`);
          console.log(`  - Projects: ${projects.size}`);
          console.log(`  - Visible tasks: ${tasks.length}`);
          console.log(`  - Done: ${done.length}`);
          console.log(`  - C4: ${c4.name || 'present'}`);
          console.log('Mission Control Pages artifact verified and ready for deploy.');
          NODE

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
