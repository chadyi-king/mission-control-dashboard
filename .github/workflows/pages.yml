name: Deploy Mission Control Dashboard

on:
  push:
    branches:
      - main
      - gh-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  DASHBOARD_BUILD_ID: 20260623-backend-contract-1
  DASHBOARD_ASSET_BUILD_ID: 20260622-visual-restore-1
  DASHBOARD_APP_FILE: app-20260623-backend-contract-1.html

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed dashboard source
        uses: actions/checkout@v7
        with:
          ref: gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare static dashboard artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html main-styles.css dashboard-hermes-bridge.js dashboard-app.js dashboard-visual-state-hydrator.js data.json mission-control-build.json dashboard-current.json "$DASHBOARD_APP_FILE" .nojekyll _site/
          if [ -d assets ]; then cp -R assets _site/assets; fi

      - name: Sanitize public dashboard snapshot
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = '_site/data.json';
          const sensitive = new Set([
            'account_id', 'accountid', 'api_key', 'apikey', 'access_token', 'accesstoken',
            'refresh_token', 'refreshtoken', 'token', 'secret', 'password', 'credential', 'credentials'
          ]);
          const normalize = (key) => String(key).trim().toLowerCase().replace(/[\s-]+/g, '_');
          const sanitize = (value) => {
            if (Array.isArray(value)) return value.map(sanitize);
            if (value && typeof value === 'object') {
              return Object.fromEntries(Object.entries(value)
                .filter(([key]) => {
                  const name = normalize(key);
                  return !sensitive.has(name) && !sensitive.has(name.replace(/_/g, ''));
                })
                .map(([key, item]) => [key, sanitize(item)]));
            }
            return value;
          };
          const data = JSON.parse(fs.readFileSync(file, 'utf8'));
          fs.writeFileSync(file, `${JSON.stringify(sanitize(data), null, 2)}\n`);
          NODE

      - name: Verify bootloader backend contract artifact
        run: |
          node <<'NODE'
          const fs = require('fs');
          const dashboardBuildId = process.env.DASHBOARD_BUILD_ID;
          const assetBuildId = process.env.DASHBOARD_ASSET_BUILD_ID;
          const appFile = process.env.DASHBOARD_APP_FILE;
          const requiredFiles = [
            'index.html', 'main-styles.css', 'dashboard-hermes-bridge.js', 'dashboard-app.js',
            'dashboard-visual-state-hydrator.js', 'data.json', 'mission-control-build.json',
            'dashboard-current.json', appFile, '.nojekyll'
          ];
          const failures = [];
          for (const file of requiredFiles) {
            if (!fs.existsSync(`_site/${file}`)) failures.push(`missing artifact file: ${file}`);
          }

          const html = fs.readFileSync('_site/index.html', 'utf8');
          const appHtml = fs.readFileSync(`_site/${appFile}`, 'utf8');
          const styles = fs.readFileSync('_site/main-styles.css', 'utf8');
          const bridge = fs.readFileSync('_site/dashboard-hermes-bridge.js', 'utf8');
          const app = fs.readFileSync('_site/dashboard-app.js', 'utf8');
          const hydrator = fs.readFileSync('_site/dashboard-visual-state-hydrator.js', 'utf8');
          const data = JSON.parse(fs.readFileSync('_site/data.json', 'utf8'));
          const marker = JSON.parse(fs.readFileSync('_site/mission-control-build.json', 'utf8'));
          const current = JSON.parse(fs.readFileSync('_site/dashboard-current.json', 'utf8'));

          const mustContain = [
            ['index.html', html, 'dashboard-current.json'],
            ['index.html', html, appFile],
            ['app html', appHtml, 'RED SUN COMMAND'],
            ['app html', appHtml, `main-styles.css?build=${assetBuildId}`],
            ['app html', appHtml, `dashboard-app.js?build=${assetBuildId}`],
            ['app html', appHtml, `dashboard-visual-state-hydrator.js?build=${dashboardBuildId}`],
            ['main-styles.css', styles, '.agent-rail'],
            ['main-styles.css', styles, '.fleet-grid'],
            ['dashboard-hermes-bridge.js', bridge, '__MISSION_CONTROL_HERMES__'],
            ['dashboard-hermes-bridge.js', bridge, '/api/sync'],
            ['dashboard-hermes-bridge.js', bridge, '/api/dashboard-intents'],
            ['dashboard-app.js', app, `BUILD_ID = '${assetBuildId}'`],
            ['dashboard-app.js', app, "cache: 'no-store'"],
            ['dashboard-app.js', app, 'const AGENT_VISUALS'],
            ['dashboard-visual-state-hydrator.js', hydrator, 'visualWorkflowState'],
            ['dashboard-visual-state-hydrator.js', hydrator, 'priorityQueueOrder'],
            ['dashboard-visual-state-hydrator.js', hydrator, 'agentBoards']
          ];
          for (const [file, body, needle] of mustContain) {
            if (!body.includes(needle)) failures.push(`${file} missing ${needle}`);
          }

          const forbiddenPatterns = [
            ['index.html', html, /api\.github\.com|localStorage|GitHub PAT|Personal Access Token/i],
            ['app html', appHtml, /api\.github\.com|localStorage|GitHub PAT|Personal Access Token/i],
            ['dashboard-hermes-bridge.js', bridge, /api\.github\.com|GitHub PAT|Personal Access Token/i],
            ['dashboard-app.js', app, /api\.github\.com|GitHub PAT|Personal Access Token/i]
          ];
          for (const [file, body, pattern] of forbiddenPatterns) {
            if (pattern.test(body)) failures.push(`${file} contains old dashboard write/cache/source-of-truth pattern: ${pattern}`);
          }

          const aliases = {
            backlog: 'open', pending: 'open', todo: 'open', review: 'needs_review',
            check_this: 'needs_review', waiting_on_you: 'input_requested', needs_input: 'input_requested',
            in_progress: 'active'
          };
          const normalizeStatus = (status) => {
            const raw = String(status || 'open').trim().toLowerCase().replace(/[\s-]+/g, '_');
            return aliases[raw] || raw || 'open';
          };
          const tasks = Object.entries(data.tasks || {})
            .filter(([, task]) => task && typeof task === 'object')
            .map(([id, task]) => ({ id: task.id || id, ...task }))
            .filter((task) => normalizeStatus(task.status) !== 'removed');
          const done = tasks.filter((task) => normalizeStatus(task.status) === 'done');
          const projects = new Set();
          Object.keys(data.projects || {}).forEach((id) => projects.add(String(id).toUpperCase()));
          Object.keys(data.projectDetails || {}).forEach((id) => projects.add(String(id).toUpperCase()));
          Object.values(data.categories || {}).forEach((category) => (category.projects || []).forEach((id) => projects.add(String(id).toUpperCase())));
          tasks.forEach((task) => { if (task.project) projects.add(String(task.project).toUpperCase()); });
          const c4 = (data.projects || {}).C4 || (data.projectDetails || {}).C4 || {};

          if (projects.size !== 22) failures.push(`expected 22 projects, found ${projects.size}`);
          if (!projects.has('C4')) failures.push('missing C4');
          if (c4.name !== 'Website Services') failures.push(`expected C4 Website Services, found ${JSON.stringify(c4.name)}`);
          if (tasks.length !== 106) failures.push(`expected 106 visible tasks, found ${tasks.length}`);
          if (done.length !== 29) failures.push(`expected 29 done tasks, found ${done.length}`);
          if (marker.kind !== 'mission-control-dashboard-build-marker') failures.push('build marker kind mismatch');
          if (marker.dashboardBuildId !== dashboardBuildId) failures.push(`build marker dashboardBuildId mismatch: ${marker.dashboardBuildId}`);
          if (marker.appBuildId !== assetBuildId) failures.push(`build marker appBuildId mismatch: ${marker.appBuildId}`);
          if (marker.currentApp !== appFile) failures.push(`build marker currentApp mismatch: ${marker.currentApp}`);
          if (current.dashboardBuildId !== dashboardBuildId) failures.push(`dashboard-current dashboardBuildId mismatch: ${current.dashboardBuildId}`);
          if (current.currentApp !== appFile) failures.push(`dashboard-current currentApp mismatch: ${current.currentApp}`);
          if (current.appBuildId !== assetBuildId) failures.push(`dashboard-current appBuildId mismatch: ${current.appBuildId}`);
          if (marker.expected?.visibleTasks !== 106 || marker.expected?.doneTasks !== 29 || marker.expected?.projects !== 22 || marker.expected?.requiredProject !== 'C4') failures.push('build marker expected counts mismatch');
          if (current.expected?.visibleTasks !== 106 || current.expected?.doneTasks !== 29 || current.expected?.projects !== 22 || current.expected?.requiredProject !== 'C4') failures.push('dashboard-current expected counts mismatch');

          const sensitive = new Set([
            'account_id', 'accountid', 'api_key', 'apikey', 'access_token', 'accesstoken',
            'refresh_token', 'refreshtoken', 'token', 'secret', 'password', 'credential', 'credentials'
          ]);
          const normalizeKey = (key) => String(key).trim().toLowerCase().replace(/[\s-]+/g, '_');
          const sensitivePaths = (value, path = 'root') => {
            const found = [];
            if (Array.isArray(value)) value.forEach((item, index) => found.push(...sensitivePaths(item, `${path}[${index}]`)));
            else if (value && typeof value === 'object') {
              Object.entries(value).forEach(([key, item]) => {
                const name = normalizeKey(key);
                if (sensitive.has(name) || sensitive.has(name.replace(/_/g, ''))) found.push(`${path}.${key}`);
                found.push(...sensitivePaths(item, `${path}.${key}`));
              });
            }
            return found;
          };
          const sensitiveFound = sensitivePaths(data);
          if (sensitiveFound.length) failures.push(`sensitive public keys remain: ${sensitiveFound.slice(0, 5).join(', ')}`);

          if (failures.length) {
            console.error(failures.map((failure) => `- ${failure}`).join('\n'));
            process.exit(1);
          }
          console.log('Mission Control Pages artifact verified: gh-pages source, root bootloader, current manifest, visual restore app, visual workflow hydrator, assets, C4, 22 projects, 106 tasks, 29 done.');
          NODE

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
