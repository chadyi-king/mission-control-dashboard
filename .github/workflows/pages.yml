name: Archived - Actions Pages Deployment Blocked By Repo Setting

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain active publisher
        run: |
          echo 'This workflow is intentionally disabled for automatic runs.'
          echo 'The repository currently reports GitHub Pages build_type=legacy and source=gh-pages / root.'
          echo 'Until Settings > Pages > Source is changed to GitHub Actions, the active publisher is .github/workflows/sync-dashboard-branches.yml.'
          echo 'Do not treat a commit or branch push as success. The live browser verifier must pass against https://chadyi-king.github.io/mission-control-dashboard/.'
