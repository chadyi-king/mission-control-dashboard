<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #050508;
            --bg-card: #0d0008;
            --bg-elevated: #12121a;
            --crimson: #8B0000;
            --crimson-bright: #DC143C;
            --crimson-glow: rgba(139, 0, 0, 0.4);
            --solar-orange: #FF6B00;
            --solar-gold: #FFD700;
            --solar-white: rgba(255, 240, 220, 0.95);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --crystal: rgba(255, 255, 255, 0.03);
            --crystal-border: rgba(255, 255, 255, 0.08);
            --tech-font: 'Rajdhani', sans-serif;
            --display-font: 'Orbitron', sans-serif;
            --mono-font: 'JetBrains Mono', monospace;
            --success: #00ff88;
            --warning: #c9a962;
            --danger: #ff4444;
            --info: #4dabf7;
        }
        
        body {
            font-family: var(--tech-font);
            font-weight: 500;
            background: #000000;
            color: var(--text-primary);
            min-height: 100vh;
            letter-spacing: 0.5px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120vw;
            height: 120vh;
            background:
                radial-gradient(circle at 50% 50%, rgba(180, 0, 0, 0.18) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(120, 0, 0, 0.10) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 48%, rgba(80, 0, 0, 0.06) 0%, transparent 55%);
            z-index: 0;
            pointer-events: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 1px solid var(--crystal-border);
        }
        
        .header h1 {
            font-family: var(--display-font);
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--solar-orange) 0%, var(--crimson-bright) 50%, var(--crimson) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .last-updated {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--crystal);
            border: 1px solid var(--crystal-border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            border-color: var(--crimson-bright);
            box-shadow: 0 0 20px var(--crimson-glow);
        }
        
        .stat-value {
            font-family: var(--display-font);
            font-size: 3rem;
            font-weight: 700;
            color: var(--solar-gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }
        
        /* Section Headers */
        .section-header {
            font-family: var(--display-font);
            font-size: 1.5rem;
            font-weight: 600;
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--crimson);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-icon {
            font-size: 1.2rem;
        }
        
        /* Task Status Colors */
        .status-done { color: var(--success); }
        .status-active { color: var(--info); }
        .status-blocked { color: var(--danger); }
        .status-backlog { color: var(--warning); }
        .status-review { color: #ff66cc; }
        
        /* Tasks Section */
        .task-grid {
            display: grid;
            gap: 12px;
        }
        
        .task-card {
            background: var(--bg-elevated);
            border: 1px solid var(--crystal-border);
            border-radius: 8px;
            padding: 16px 20px;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 16px;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        .task-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--crimson-bright);
        }
        
        .task-id {
            font-family: var(--mono-font);
            font-weight: 600;
            color: var(--solar-orange);
            font-size: 0.9rem;
        }
        
        .task-title {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .task-owner {
            font-family: var(--mono-font);
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 4px 10px;
            background: var(--crystal);
            border-radius: 4px;
        }
        
        .task-status {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Category Cards */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        
        .category-card {
            background: var(--crystal);
            border: 1px solid var(--crystal-border);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .category-header {
            background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson-bright) 100%);
            padding: 16px 20px;
            font-family: var(--display-font);
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .category-content {
            padding: 16px;
        }
        
        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--crystal-border);
            transition: background 0.2s ease;
        }
        
        .project-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .project-item:last-child {
            border-bottom: none;
        }
        
        .project-name {
            font-weight: 500;
        }
        
        .project-progress {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .progress-bar {
            width: 100px;
            height: 6px;
            background: var(--crystal);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--solar-orange), var(--solar-gold));
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-family: var(--mono-font);
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 40px;
            text-align: right;
        }
        
        /* Agents Section */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }
        
        .agent-card {
            background: var(--bg-elevated);
            border: 1px solid var(--crystal-border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--crimson), var(--crimson-bright));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .agent-info h3 {
            font-family: var(--display-font);
            font-size: 1rem;
            margin-bottom: 4px;
        }
        
        .agent-status {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .health-active { color: var(--success); }
        .health-idle { color: var(--warning); }
        .health-offline { color: var(--danger); }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 20px;
            color: var(--danger);
            text-align: center;
            margin: 20px 0;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--crimson);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--crimson-bright);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .category-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .task-card {
                grid-template-columns: 1fr auto;
                gap: 8px;
            }
            
            .task-id, .task-owner {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>⚡ Mission Control</h1>
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </header>
        
        <div id="loading" class="loading">Initializing dashboard...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="dashboard" style="display: none;">
            <!-- Stats Section -->
            <div class="stats-grid" id="statsGrid">
                <!-- Populated by JS -->
            </div>
            
            <!-- Needs Attention Section -->
            <h2 class="section-header">
                <span class="section-icon">🔴</span>
                Needs Attention
            </h2>
            <div class="task-grid" id="needsAttention">
                <!-- Populated by JS -->
            </div>
            
            <!-- Active Tasks Section -->
            <h2 class="section-header">
                <span class="section-icon">🟢</span>
                Active Tasks
            </h2>
            <div class="task-grid" id="activeTasks">
                <!-- Populated by JS -->
            </div>
            
            <!-- Categories Section -->
            <h2 class="section-header">
                <span class="section-icon">📊</span>
                Categories & Projects
            </h2>
            <div class="category-grid" id="categoryGrid">
                <!-- Populated by JS -->
            </div>
            
            <!-- Agents Section -->
            <h2 class="section-header">
                <span class="section-icon">🤖</span>
                Agent Status
            </h2>
            <div class="agent-grid" id="agentGrid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>
    
    <script>
        let appData = null;
        
        async function loadData() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const dashboardEl = document.getElementById('dashboard');
            
            try {
                // Try to load data.json from same directory
                const response = await fetch('data.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                appData = await response.json();
                console.log('Dashboard data loaded:', appData);
                
                loadingEl.style.display = 'none';
                dashboardEl.style.display = 'block';
                
                renderDashboard();
                
            } catch (err) {
                console.error('Failed to load data:', err);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = `
                    <strong>Failed to load dashboard data</strong><br>
                    ${err.message}<br><br>
                    <small>Make sure data.json is in the same folder as this HTML file.</small>
                `;
            }
        }
        
        function renderDashboard() {
            // Update timestamp
            const lastUpdated = appData.lastUpdated || 'Unknown';
            document.getElementById('lastUpdated').textContent = 
                `Last updated: ${new Date(lastUpdated).toLocaleString('en-SG', {timeZone: 'Asia/Singapore'})} SGT`;
            
            // Render stats
            renderStats();
            
            // Render tasks
            renderNeedsAttention();
            renderActiveTasks();
            
            // Render categories
            renderCategories();
            
            // Render agents
            renderAgents();
        }
        
        function renderStats() {
            const stats = appData.stats || {};
            const grid = document.getElementById('statsGrid');
            
            const statItems = [
                { label: 'Total Tasks', value: stats.totalTasks || 0 },
                { label: 'Completed', value: stats.completedTasks || 0 },
                { label: 'Active', value: stats.activeTasks || 0 },
                { label: 'Blocked', value: stats.blockedTasks || 0 },
                { label: 'Backlog', value: stats.backlogTasks || 0 },
                { label: 'Needs Attention', value: stats.needsAttention || 0 }
            ];
            
            grid.innerHTML = statItems.map(stat => `
                <div class="stat-card">
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');
        }
        
        function renderNeedsAttention() {
            const container = document.getElementById('needsAttention');
            const needsAttention = appData.needsAttention || [];
            
            if (needsAttention.length === 0) {
                container.innerHTML = '<div class="task-card"><div class="task-title">All caught up! No tasks need immediate attention.</div></div>';
                return;
            }
            
            // Remove duplicates by ID
            const unique = [];
            const seen = new Set();
            for (const item of needsAttention) {
                if (!seen.has(item.id)) {
                    seen.add(item.id);
                    unique.push(item);
                }
            }
            
            container.innerHTML = unique.slice(0, 10).map(task => `
                <div class="task-card">
                    <div class="task-id">${task.id}</div>
                    <div class="task-title">${task.title}</div>
                    <div class="task-owner">${task.owner}</div>
                    <div class="task-status status-${task.priority === 'critical' ? 'blocked' : task.priority}">${task.priority}</div>
                </div>
            `).join('');
        }
        
        function renderActiveTasks() {
            const container = document.getElementById('activeTasks');
            const tasks = appData.tasks || {};
            
            const active = Object.values(tasks).filter(t => t.status === 'active' || t.status === 'in progress');
            
            if (active.length === 0) {
                container.innerHTML = '<div class="task-card"><div class="task-title">No active tasks right now.</div></div>';
                return;
            }
            
            container.innerHTML = active.map(task => `
                <div class="task-card">
                    <div class="task-id">${task.id}</div>
                    <div class="task-title">${task.title}</div>
                    <div class="task-owner">${task.agent}</div>
                    <div class="task-status status-active">${task.status}</div>
                </div>
            `).join('');
        }
        
        function renderCategories() {
            const container = document.getElementById('categoryGrid');
            const projects = appData.projects || {};
            const projectDetails = appData.projectDetails || {};
            
            const categoryIcons = {
                'A': '⚡',
                'B': '💼',
                'C': '🎯'
            };
            
            const categoryNames = {
                'A': 'Ambition (Personal)',
                'B': 'Business (Empire)',
                'C': 'Callings (Side Jobs)'
            };
            
            container.innerHTML = Object.entries(projects).map(([key, cat]) => {
                const icon = categoryIcons[key] || '📁';
                const name = categoryNames[key] || cat.name;
                
                const projectList = cat.projects || [];
                
                return `
                    <div class="category-card">
                        <div class="category-header">
                            ${icon} ${name}
                        </div>
                        <div class="category-content">
                            ${projectList.map(projId => {
                                const details = projectDetails[projId] || {};
                                const progress = details.progress || 0;
                                const taskCount = details.taskCount || 0;
                                const completed = details.completedCount || 0;
                                
                                return `
                                    <div class="project-item">
                                        <span class="project-name">${projId}</span>
                                        <div class="project-progress">
                                            <div class="progress-bar">
                                                <div class="progress-fill" style="width: ${progress}%"></div>
                                            </div>
                                            <span class="progress-text">${completed}/${taskCount}</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderAgents() {
            const container = document.getElementById('agentGrid');
            const agents = appData.agents || {};
            
            const agentEmojis = {
                'chad-yi': '🎭',
                'helios': '🌅',
                'cerebronn': '🧠',
                'quanta': '📈',
                'escritor': '✍️',
                'mensamusa': '🎨',
                'autour': '🎬',
                'forger': '🔨'
            };
            
            container.innerHTML = Object.entries(agents).map(([name, info]) => {
                const emoji = agentEmojis[name] || '🤖';
                const health = info.health || info.status || 'unknown';
                const healthClass = `health-${health}`;
                
                return `
                    <div class="agent-card">
                        <div class="agent-avatar">${emoji}</div>
                        <div class="agent-info">
                            <h3>${name}</h3>
                            <div class="agent-status ${healthClass}">
                                ${health.toUpperCase()}${info.currentTask ? ` — ${info.currentTask}` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 60 seconds
        setInterval(loadData, 60000);
    </script>
</body>
</html>
