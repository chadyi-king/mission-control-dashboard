<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Mission Control Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #050508; color: rgba(255,255,255,.92); font-family: Arial, sans-serif; }
    body { display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 50% 35%, rgba(220,20,60,.18), transparent 32%), #050508; }
    .boot { width: min(520px, 100%); border: 1px solid rgba(220,20,60,.35); background: rgba(8,8,13,.88); padding: 22px; border-radius: 8px; box-shadow: 0 18px 70px rgba(0,0,0,.55); }
    .brand { color: #dc143c; font-weight: 800; font-size: 14px; text-transform: uppercase; margin-bottom: 8px; }
    .status { color: rgba(230,232,245,.7); line-height: 1.45; }
    .error { color: #ff7070; margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <main class="boot" id="boot">
    <div class="brand">RED SUN COMMAND</div>
    <div class="status" id="boot-status">Loading Mission Control...</div>
    <div class="error" id="boot-error" hidden></div>
  </main>

  <script>
    (async function bootMissionControl() {
      const status = document.getElementById('boot-status');
      const errorBox = document.getElementById('boot-error');
      const BOOT_ID = '20260624-root-cache-kill-1';

      function withNoCache(path, build) {
        const url = new URL(path, window.location.href);
        url.searchParams.set('build', build || BOOT_ID);
        url.searchParams.set('t', String(Date.now()));
        return url.toString();
      }

      async function clearStaleRuntimeCaches() {
        let hadController = false;
        try {
          hadController = !!(navigator.serviceWorker && navigator.serviceWorker.controller);
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister().catch(() => false)));
          }
        } catch (error) {
          console.warn('[Mission Control Boot] service worker cleanup skipped', error);
        }

        try {
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key).catch(() => false)));
          }
        } catch (error) {
          console.warn('[Mission Control Boot] cache cleanup skipped', error);
        }

        if (hadController && !sessionStorage.getItem('mission-control-cache-kill-reloaded')) {
          sessionStorage.setItem('mission-control-cache-kill-reloaded', BOOT_ID);
          status.textContent = 'Refreshing Mission Control runtime...';
          window.location.replace(window.location.href);
          return false;
        }
        return true;
      }

      try {
        const canContinue = await clearStaleRuntimeCaches();
        if (!canContinue) return;

        // Force layout v2 - bypass manifest CDN cache
        const appFile = 'app-20260624-layout-v2.html';
        const appBuild = '20260624-layout-v2';
        status.textContent = 'Loading Mission Control...';

        const appResponse = await fetch(withNoCache(appFile, appBuild), {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache' }
        });
        if (!appResponse.ok) throw new Error(appFile + ' HTTP ' + appResponse.status);

        const html = await appResponse.text();
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error('[Mission Control Boot]', error);
        status.textContent = 'Mission Control could not boot.';
        errorBox.hidden = false;
        errorBox.textContent = error.message || String(error);
      }
    })();
  </script>
</body>
</html>
