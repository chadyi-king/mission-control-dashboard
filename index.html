<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control Dashboard</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050507;
      color: rgba(235,235,245,.86);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #mission-control-frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #050507;
      display: none;
    }
    #boot-state {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      background: radial-gradient(circle at 50% 42%, rgba(120, 20, 24, .32), rgba(5, 5, 7, 1) 62%);
    }
    .boot-title {
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(220, 60, 80, .95);
      margin-bottom: 8px;
    }
    .boot-sub {
      font-size: 13px;
      color: rgba(180,185,205,.76);
      line-height: 1.5;
    }
    .boot-error {
      max-width: 760px;
      line-height: 1.55;
    }
    .boot-error code {
      color: #ffb86b;
    }
  </style>
</head>
<body>
  <div id="boot-state">
    <div>
      <div class="boot-title">Mission Control</div>
      <div class="boot-sub">Loading current dashboard build...</div>
    </div>
  </div>
  <iframe id="mission-control-frame" title="Mission Control Dashboard"></iframe>
  <script>
    (async function bootMissionControlRoot() {
      const MANIFEST_URL = 'dashboard-current.json?boot=' + Date.now();
      const DATA_URL = 'data.json?boot=' + Date.now();
      const bootState = document.getElementById('boot-state');
      const frame = document.getElementById('mission-control-frame');

      function escapeHtml(value) {
        return String(value).replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
      }

      function showError(message, detail) {
        bootState.innerHTML = '<div class="boot-error"><div class="boot-title">Dashboard Load Blocked</div>' +
          '<div class="boot-sub">' + escapeHtml(message) + '</div>' +
          (detail ? '<pre style="white-space:pre-wrap;text-align:left;margin-top:16px;color:rgba(230,190,150,.9)">' + escapeHtml(detail) + '</pre>' : '') +
          '</div>';
      }

      async function loadJson(url) {
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) throw new Error(url + ' returned HTTP ' + response.status);
        return response.json();
      }

      try {
        const manifest = await loadJson(MANIFEST_URL);
        const data = await loadJson(DATA_URL);
        const hasC4 = Boolean((data.projects && data.projects.C4) || (data.projectDetails && data.projectDetails.C4));
        const totalTasks = Number(data.stats && data.stats.totalTasks);
        const doneTasks = Number(data.stats && data.stats.completedTasks);
        const expected = manifest.expected || {};

        if (!hasC4 || totalTasks !== Number(expected.totalTasks) || doneTasks !== Number(expected.completedTasks)) {
          console.warn('[Mission Control Root] Data preflight mismatch', { hasC4, totalTasks, doneTasks, expected });
        }

        const entry = manifest.entry || 'app-20260622-source-of-truth-v3.html';
        const separator = entry.indexOf('?') === -1 ? '?' : '&';
        const hash = window.location.hash || '';
        frame.src = entry + separator + 'build=' + encodeURIComponent(manifest.build || 'current') + '&boot=' + Date.now() + hash;
        frame.onload = function () {
          frame.style.display = 'block';
          bootState.style.display = 'none';
        };
        frame.onerror = function () {
          showError('The current dashboard app file failed to load.', entry);
        };
      } catch (error) {
        console.error('[Mission Control Root] Boot failed.', error);
        showError('The dashboard root loader could not load the current manifest/data/app path.', error && (error.stack || error.message || error));
      }
    })();
  </script>
</body>
</html>
